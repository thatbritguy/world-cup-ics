name: Update World Cup calendar

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Ignore tournament update cutoffs
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: update-world-cup-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update and validate calendar
        env:
          FORCE_UPDATE: ${{ inputs.force }}
        run: |
          if [[ "$FORCE_UPDATE" == "true" ]]; then
            python scripts/update_calendar.py --force
          else
            python scripts/update_calendar.py
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/2026/worldcup.json \
            data/2026/worldcup.broadcasters.json \
            data/2026/worldcup.calendar-state.json \
            ics/world-cup-2026.ics
          if git diff --cached --quiet; then
            echo "No calendar changes"
            exit 0
          fi
          git commit -m "Update World Cup calendar"
          git push
